<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Ultra Metallic Chrome Silver Gradient -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="15%" stop-color="#F1F5F9" />
      <stop offset="35%" stop-color="#CBD5E1" />
      <stop offset="48%" stop-color="#64748B" />
      <stop offset="52%" stop-color="#1E293B" />
      <stop offset="55%" stop-color="#94A3B8" />
      <stop offset="75%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Vibrant Red Gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="50%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>

    <!-- Strong drop shadow for contrast on any background -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.95" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arc for Curved Bottom Tagline Text -->
    <!-- Radiating from center 250,250 with radius 185 -->
    <path id="taglinePath" d="M 85,355 A 185,185 0 0,0 415,355" fill="none" />
  </defs>

  <!-- Base Circle with Premium Dark Background -->
  <!-- Outer Silver/Metallic Rim -->
  <circle cx="250" cy="250" r="238" fill="#030712" stroke="url(#silver)" stroke-width="10" filter="url(#shadow)" />
  
  <!-- Inner Vibrant Red Accent Rim -->
  <circle cx="250" cy="250" r="224" fill="none" stroke="#DC2626" stroke-width="5" />

  <!-- Speedometer / Tachometer Gauge Arc (Top) -->
  <g opacity="0.95">
    <!-- Outer dotted gauge track -->
    <path d="M 95,240 A 165,165 0 0,1 405,240" fill="none" stroke="#E2E8F0" stroke-width="3" stroke-dasharray="3 10" />
    <!-- Inner solid gauge accent track -->
    <path d="M 110,240 A 150,150 0 0,1 390,240" fill="none" stroke="url(#redGrad)" stroke-width="3.5" />
    <!-- Speedometer ticks -->
    <path d="M 100,230 L 112,232" stroke="#E2E8F0" stroke-width="4.5" />
    <path d="M 110,192 L 122,197" stroke="#E2E8F0" stroke-width="4.5" />
    <path d="M 129,158 L 140,166" stroke="#E2E8F0" stroke-width="4.5" />
    <path d="M 155,128 L 165,137" stroke="#E2E8F0" stroke-width="4.5" />
    <path d="M 189,105 L 198,115" stroke="#E2E8F0" stroke-width="4.5" />
    <path d="M 228,92 L 232,103" stroke="#E2E8F0" stroke-width="4.5" />
    <path d="M 272,92 L 268,103" stroke="#EF4444" stroke-width="4.5" />
    <path d="M 311,105 L 302,115" stroke="#EF4444" stroke-width="4.5" />
    <path d="M 345,128 L 335,137" stroke="#EF4444" stroke-width="4.5" />
    <path d="M 371,158 L 360,166" stroke="#EF4444" stroke-width="4.5" />
    <path d="M 390,192 L 378,197" stroke="#EF4444" stroke-width="4.5" />
    <path d="M 400,230 L 388,232" stroke="#EF4444" stroke-width="4.5" />
  </g>

  <!-- Speedometer Needle (High Performance Position) -->
  <g filter="url(#shadow)">
    <!-- Needle Hub / Center Pin -->
    <circle cx="250" cy="240" r="10" fill="#EF4444" />
    <circle cx="250" cy="240" r="5" fill="#FFFFFF" />
    <!-- Needle Blade -->
    <path d="M 250,235 L 370,120 L 254,244 Z" fill="url(#redGrad)" />
  </g>

  <!-- Sleek Chrome Sports Car Silhouette -->
  <g filter="url(#shadow)">
    <!-- Car Body Shape Outline with crisp metallic contrast -->
    <path d="M 90,212 
             C 112,204 138,198 185,180 
             C 210,173 230,160 250,147 
             C 275,130 320,130 345,150
             C 375,173 400,180 415,190
             C 410,185 395,177 375,173
             C 325,165 300,157 265,157
             C 230,157 200,167 170,180
             C 140,193 115,201 90,212 Z" 
          fill="url(#silver)" />
          
    <!-- Dynamic Car Windshield Highlight -->
    <path d="M 255,152 
             C 275,137 315,137 335,152 
             C 310,147 280,147 255,152 Z" 
          fill="#FFFFFF" opacity="0.85" />

    <!-- Sleek Wheel Wells Base Shadow / Light accent -->
    <path d="M 112,212 A 26,26 0 0,1 164,212 Z" fill="#030712" />
    <path d="M 336,204 A 29,29 0 0,1 394,204 Z" fill="#030712" />
    
    <path d="M 112,212 A 26,26 0 0,1 164,212" fill="none" stroke="url(#silver)" stroke-width="3" />
    <path d="M 336,204 A 29,29 0 0,1 394,204" fill="none" stroke="url(#silver)" stroke-width="3" />
  </g>

  <!-- MVSS Metallic Bold Branding Text with Custom Separator -->
  <g filter="url(#shadow)" transform="skewX(-11) translate(28, 0)">
    <!-- Text with clean system sans-serif but extremely heavy styling and outline -->
    <text x="220" y="278" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Arial Black', sans-serif" 
          font-size="86" 
          font-weight="950" 
          fill="url(#silver)" 
          stroke="#0F172A" 
          stroke-width="3" 
          text-anchor="middle" 
          letter-spacing="5">MVSS</text>
          
    <!-- Red Accent Chevron / Triangle embedded over the V -->
    <polygon points="214,210 230,230 246,210" fill="#EF4444" stroke="#0F172A" stroke-width="2" />
  </g>

  <!-- AUTOMOBILES Text below MVSS -->
  <g filter="url(#shadow)" transform="skewX(-11) translate(28, 0)">
    <text x="220" y="316" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="25" 
          font-weight="900" 
          fill="#EF4444" 
          stroke="#1E1B4B"
          stroke-width="0.5"
          text-anchor="middle" 
          letter-spacing="12"
          filter="url(#glow)">AUTOMOBILES</text>
  </g>

  <!-- auto4m Text and Lateral Accent Lines -->
  <g filter="url(#shadow)" transform="skewX(-11) translate(28, 0)">
    <!-- Three Left Accent Speed Lines -->
    <line x1="72" y1="345" x2="135" y2="345" stroke="url(#silver)" stroke-width="5" stroke-linecap="round" />
    <line x1="86" y1="352" x2="135" y2="352" stroke="url(#silver)" stroke-width="3.5" stroke-linecap="round" />
    <line x1="100" y1="359" x2="135" y2="359" stroke="url(#silver)" stroke-width="2" stroke-linecap="round" />

    <!-- Centered Brand Text: "auto" in white, "4m" in Red -->
    <text x="220" y="356" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Arial Black', sans-serif" 
          font-size="33" 
          font-weight="950" 
          text-anchor="middle">
      <tspan fill="#FFFFFF" stroke="#000000" stroke-width="1">auto</tspan><tspan fill="#EF4444" stroke="#000000" stroke-width="1">4m</tspan>
    </text>

    <!-- Three Right Accent Speed Lines -->
    <line x1="305" y1="345" x2="368" y2="345" stroke="url(#silver)" stroke-width="5" stroke-linecap="round" />
    <line x1="305" y1="352" x2="354" y2="352" stroke="url(#silver)" stroke-width="3.5" stroke-linecap="round" />
    <line x1="305" y1="359" x2="340" y2="359" stroke="url(#silver)" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Bottom Red Accent Wavy Line below auto4m -->
  <path d="M 170,378 Q 250,363 330,378" fill="none" stroke="#EF4444" stroke-width="4.5" stroke-linecap="round" filter="url(#shadow)" />

  <!-- Tagline Curved: "DRIVE • TRUST • SERVICE" at the bottom -->
  <g filter="url(#shadow)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="16.5" 
          font-weight="900" 
          fill="#FFFFFF" 
          letter-spacing="5.5"
          word-spacing="8">
      <textPath href="#taglinePath" startOffset="50%" text-anchor="middle">
        DRIVE • TRUST • SERVICE
      </textPath>
    </text>
  </g>
</svg>
